<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bourbon Truth">
<title>🥃 Bourbon Truth Scanner v6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
:root {
  --bg:     #080502;
  --bg2:    #0f0904;
  --bg3:    #160d05;
  --bg4:    #1e1208;
  --gold:   #c9943a;
  --gold2:  #7a501a;
  --gold3:  #3d2508;
  --goldb:  #f0c060; /* bright gold for highlights */
  --text:   #e8d4a8;
  --text2:  #9e7c40;
  --text3:  #4e3515;
  --legit:  #1fc55a;
  --sourced:#e84444;
  --mixed:  #e8960a;
  --radius: 12px;
  --tab-h:  64px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow-x: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', Georgia, sans-serif;
  min-height: 100vh;
  padding-bottom: calc(var(--tab-h) + var(--safe-b) + 8px);
}

/* Grain texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.6;
}

/* HEADER */
#header {
  position: relative; overflow: hidden;
  background: linear-gradient(170deg, #1e0e02 0%, var(--bg) 100%);
  border-bottom: 1px solid rgba(201,148,58,0.25);
  padding: calc(env(safe-area-inset-top, 10px) + 14px) 16px 14px;
  text-align: center; z-index: 10;
}
#header::before {
  content: '';
  position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 140px;
  background: radial-gradient(ellipse, rgba(201,148,58,0.18) 0%, transparent 70%);
  pointer-events: none;
}
#header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,148,58,0.4), transparent);
}
.h-icon { font-size: 28px; line-height: 1; margin-bottom: 4px; }
.h-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(17px, 5vw, 26px);
  font-weight: 900;
  color: var(--goldb);
  letter-spacing: 0.12em;
  text-shadow: 0 0 40px rgba(240,192,96,0.35);
}
.h-sub { color: var(--text3); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 3px; }

/* STATS ROW */
.stats-row {
  display: flex; justify-content: center; gap: 10px; margin-top: 10px;
  flex-wrap: wrap;
}
.stat-chip {
  padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em;
}
.stat-chip.legit  { background: rgba(31,197,90,0.12); border: 1px solid rgba(31,197,90,0.25); color: var(--legit); }
.stat-chip.sourced { background: rgba(232,68,68,0.1); border: 1px solid rgba(232,68,68,0.22); color: var(--sourced); }
.stat-chip.mixed  { background: rgba(232,150,10,0.1); border: 1px solid rgba(232,150,10,0.22); color: var(--mixed); }

/* BOTTOM NAV */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(8,5,2,0.96);
  border-top: 1px solid rgba(201,148,58,0.18);
  display: flex;
  padding-bottom: var(--safe-b);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  height: calc(var(--tab-h) + var(--safe-b));
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 2px 6px;
  background: none; border: none; cursor: pointer;
  color: var(--text3);
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 500;
  letter-spacing: 0.04em; gap: 3px;
  position: relative; transition: color 0.2s;
}
.nav-btn.active { color: var(--goldb); }
.nav-btn.active::after {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 0 0 2px 2px;
}
.nav-icon { font-size: 19px; line-height: 1; }
.nav-label { font-size: 8.5px; }

/* MAIN */
#main { padding: 14px 14px 0; max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 11px; }
.search-input {
  width: 100%; padding: 13px 46px 13px 16px;
  background: var(--bg3); border: 1.5px solid var(--gold3); border-radius: var(--radius);
  color: var(--text); font-size: 16px; font-family: 'DM Sans', sans-serif;
  outline: none; appearance: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,148,58,0.08); }
.search-input::placeholder { color: var(--text3); }
.search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text3); font-size: 18px;
  cursor: pointer; padding: 4px; line-height: 1; display: none;
}

/* RECENTLY VIEWED */
.recent-section { margin-bottom: 12px; }
.recent-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
.recent-label::after { content: ''; flex: 1; height: 1px; background: rgba(61,37,8,0.5); }
.recent-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.recent-chip {
  padding: 5px 11px; border-radius: 20px; font-size: 11px;
  background: var(--bg3); border: 1px solid var(--gold3); color: var(--text2);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.recent-chip:active { background: var(--bg4); border-color: var(--gold2); color: var(--goldb); }
.recent-chip .recent-badge { font-size: 9px; margin-left: 3px; opacity: 0.7; }

/* CAMERA BUTTON */
.cam-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg4) 100%);
  border: 1.5px dashed var(--gold2); border-radius: var(--radius);
  color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.2s;
}
.cam-btn:active { background: var(--bg4); border-color: var(--gold); border-style: solid; }

/* CAMERA MODAL */
#cam-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.98); z-index: 500;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
}
#cam-modal.open { display: flex; }
#cam-container {
  position: relative; width: 100%; max-width: 420px;
  border-radius: 16px; overflow: hidden;
  border: 1.5px solid rgba(201,148,58,0.4);
  box-shadow: 0 0 60px rgba(201,148,58,0.1);
}
#cam-container video { width: 100%; display: block; }
#cam-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame {
  width: 72%; height: 85px;
  border-radius: 10px;
  position: relative;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
}
.scan-frame::before, .scan-frame::after {
  content: ''; position: absolute; width: 22px; height: 22px;
  border-color: var(--goldb); border-style: solid;
}
.scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
.scan-frame::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
.scan-frame-inner::before, .scan-frame-inner::after {
  content: ''; position: absolute; width: 22px; height: 22px;
  border-color: var(--goldb); border-style: solid;
}
.scan-frame-inner::before { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
.scan-frame-inner::after  { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--goldb), transparent);
  animation: scanAnim 2.2s ease-in-out infinite;
  box-shadow: 0 0 12px var(--goldb), 0 0 24px rgba(240,192,96,0.4);
}
@keyframes scanAnim {
  0%,100% { top: 0; opacity: 0; }
  8% { opacity: 1; }
  92% { opacity: 1; }
  50% { top: calc(100% - 2px); }
}
.cam-close {
  margin-top: 18px; padding: 12px 36px;
  background: var(--bg3); border: 1px solid var(--gold2); border-radius: 30px;
  color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
  transition: all 0.2s;
}
.cam-close:active { background: var(--bg4); }
.cam-status { margin-top: 12px; font-size: 13px; color: var(--text2); text-align: center; min-height: 20px; }
.cam-instructions { color: var(--text3); font-size: 11.5px; text-align: center; margin-bottom: 14px; line-height: 1.7; }

/* FILTER PILLS */
.pills { display: flex; gap: 6px; flex-wrap: nowrap; margin-bottom: 11px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.pills::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 13px; border-radius: 20px; border: 1px solid rgba(61,37,8,0.6);
  background: transparent; color: var(--text3); font-size: 11.5px;
  cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;
  white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
}
.pill.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 700; }

.results-count { color: var(--text3); font-size: 11px; margin-bottom: 10px; }

/* BRAND CARDS */
.bcard {
  background: var(--bg2); border: 1px solid rgba(61,37,8,0.35);
  border-radius: var(--radius); padding: 13px 14px; margin-bottom: 9px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: background 0.18s, border-color 0.18s;
  border-left-width: 4px;
}
.bcard.open { background: var(--bg3); }
.bcard.legit   { border-left-color: var(--legit); }
.bcard.sourced { border-left-color: var(--sourced); }
.bcard.mixed   { border-left-color: var(--mixed); }
.bcard-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
.bcard-name-row { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
.bcard-name { font-family: 'Playfair Display', serif; font-size: 15.5px; font-weight: 700; color: var(--text); }
.bcard-pts { font-size: 9.5px; color: var(--gold); border: 1px solid rgba(201,148,58,0.22); padding: 1px 6px; border-radius: 10px; letter-spacing: 0.03em; }
.verdict-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; white-space: nowrap;
  flex-shrink: 0; padding: 3px 9px; border-radius: 20px;
}
.verdict-badge.legit   { background: rgba(31,197,90,0.12); border: 1px solid rgba(31,197,90,0.3); color: var(--legit); }
.verdict-badge.sourced { background: rgba(232,68,68,0.1); border: 1px solid rgba(232,68,68,0.3); color: var(--sourced); }
.verdict-badge.mixed   { background: rgba(232,150,10,0.1); border: 1px solid rgba(232,150,10,0.28); color: var(--mixed); }

.bcard-maker { font-size: 11.5px; color: var(--text2); margin-top: 5px; }
.bcard-meta { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.bcard-parent { font-size: 10.5px; }
.bcard-price { font-size: 11px; color: var(--text3); font-weight: 500; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.tag { font-size: 9.5px; padding: 2px 7px; border-radius: 10px; background: var(--bg4); border: 1px solid rgba(61,37,8,0.5); color: var(--text3); font-weight: 500; }

/* TRUTH SCORE BAR */
.score-bar-wrap { margin-top: 9px; }
.score-bar-label { display: flex; justify-content: space-between; font-size: 9.5px; color: var(--text3); margin-bottom: 4px; }
.score-bar-label span:last-child { color: var(--text2); font-weight: 600; }
.score-bar-track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
.score-bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.score-bar-fill.legit   { background: linear-gradient(90deg, #0f7a35, var(--legit)); }
.score-bar-fill.sourced { background: linear-gradient(90deg, #8a1a1a, var(--sourced)); }
.score-bar-fill.mixed   { background: linear-gradient(90deg, #7a5200, var(--mixed)); }

/* EXPAND */
.expand { margin-top: 13px; padding-top: 13px; border-top: 1px solid rgba(61,37,8,0.35); }
.notes { border-radius: 8px; padding: 11px 13px; font-size: 12.5px; line-height: 1.8; color: #c2996a; }
.notes.legit   { background: #020e06; border: 1px solid rgba(31,197,90,0.12); }
.notes.sourced { background: #0d0202; border: 1px solid rgba(232,68,68,0.12); }
.notes.mixed   { background: #0d0800; border: 1px solid rgba(232,150,10,0.12); }
.parent-box { margin-top: 9px; background: var(--bg); border-radius: 8px; padding: 9px 12px; }
.parent-name { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.parent-note { font-size: 11px; color: var(--text3); line-height: 1.6; }
.alts-sec { margin-top: 10px; }
.alts-lbl { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
.alt-chip {
  display: inline-block; padding: 5px 10px; border-radius: 7px;
  background: rgba(31,197,90,0.06); border: 1px solid rgba(31,197,90,0.22);
  color: var(--legit); font-size: 11px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  margin: 0 5px 5px 0; transition: background 0.15s;
}
.alt-chip:active { background: rgba(31,197,90,0.12); }

/* FAVORITE BUTTON */
.fav-btn {
  background: none; border: none; cursor: pointer;
  font-size: 16px; padding: 2px 4px; line-height: 1;
  color: var(--text3); flex-shrink: 0; transition: transform 0.2s;
}
.fav-btn.faved { color: #f0a000; }
.fav-btn:active { transform: scale(1.3); }

/* AI LOOKUP */
.ai-btn {
  width: 100%; margin-top: 11px; padding: 11px;
  background: linear-gradient(135deg, var(--bg4) 0%, #1a1000 100%);
  border: 1px solid rgba(201,148,58,0.28); border-radius: 8px;
  color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all 0.2s;
}
.ai-btn:active { border-color: var(--gold); background: var(--bg4); }
.ai-result {
  margin-top: 10px; background: var(--bg4); border: 1px solid rgba(201,148,58,0.18);
  border-radius: 8px; padding: 12px; font-size: 12.5px; color: var(--text2); line-height: 1.8;
}
.ai-result .ai-loading { display: flex; align-items: center; gap: 9px; color: var(--gold); font-size: 13px; }
.ai-result .ai-loading::before { content: ''; width: 13px; height: 13px; border: 2px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: block; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.ai-label { color: var(--goldb); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; display: block; }

/* LABEL DECODER */
.clue { border-radius: 9px; padding: 11px 13px; margin-bottom: 8px; }
.clue.safe   { background: #020a04; border: 1px solid rgba(31,197,90,0.18); border-left: 4px solid var(--legit); }
.clue.unsafe { background: #0a0202; border: 1px solid rgba(232,68,68,0.15); border-left: 4px solid var(--sourced); }
.clue.warn   { background: #0a0600; border: 1px solid rgba(232,150,10,0.15); border-left: 4px solid var(--mixed); }
.clue-q { font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--text); margin-bottom: 4px; }
.clue-a { font-size: 12px; line-height: 1.5; font-weight: 500; }
.clue-a.safe   { color: var(--legit); }
.clue-a.unsafe { color: var(--sourced); }
.clue-a.warn   { color: var(--mixed); }

/* OWNERSHIP */
.owner-card { border-radius: var(--radius); padding: 13px 15px; margin-bottom: 12px; background: var(--bg2); border-left-width: 4px; border-left-style: solid; }
.owner-name { font-family: 'Playfair Display', serif; font-size: 14.5px; font-weight: 700; margin-bottom: 4px; }
.owner-note { font-size: 11px; color: var(--text3); line-height: 1.65; margin-bottom: 9px; }
.owner-brands { display: flex; flex-wrap: wrap; gap: 5px; }
.o-brand { padding: 3px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: opacity 0.15s; }
.o-brand:active { opacity: 0.7; }

/* BUY INSTEAD */
.swap { background: var(--bg2); border: 1px solid rgba(61,37,8,0.3); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 11px; transition: border-color 0.3s; }
.swap.cam-highlight { border-color: var(--gold); animation: camPulse 1.5s ease 3; }
@keyframes camPulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,148,58,0);} 50%{box-shadow:0 0 0 6px rgba(201,148,58,0.25);} }
.tab-cam-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 11px 14px; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg4) 100%);
  border: 1.5px dashed var(--gold2); border-radius: var(--radius);
  color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.tab-cam-btn:active { border-style: solid; border-color: var(--gold); }
.tab-cam-btn-icon { font-size: 20px; flex-shrink: 0; }
.tab-cam-btn-text { text-align: left; }
.tab-cam-btn-title { font-weight: 600; }
.tab-cam-btn-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.skip-header { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.skip-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 15px; }
.skip-sub { font-size: 10.5px; color: var(--text3); }
.skip-note { font-size: 12px; color: var(--text3); margin-bottom: 10px; line-height: 1.65; }
.buy-lbl { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
.buy-item { background: rgba(31,197,90,0.04); border: 1px solid rgba(31,197,90,0.17); border-radius: 8px; padding: 10px 12px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.buy-name { color: var(--legit); font-size: 14px; font-weight: 600; }
.buy-maker { color: #16a34a; font-size: 11px; margin-top: 1px; }
.buy-note-t { color: #14532d; font-size: 11px; margin-top: 3px; line-height: 1.5; }
.buy-price { color: var(--legit); font-size: 13px; font-weight: 700; white-space: nowrap; text-align: right; }
.buy-pts { color: #16a34a; font-size: 10.5px; }

/* INFO BOX */
.info-box { background: var(--bg3); border: 1px solid rgba(61,37,8,0.4); border-radius: 9px; padding: 13px; margin-top: 12px; }
.info-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.info-text { color: var(--text2); font-size: 12px; line-height: 1.75; }

/* SECTION HEADERS */
.section-h2 {
  font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700;
  color: var(--goldb); margin-bottom: 6px;
}
.section-desc { color: var(--text3); font-size: 12.5px; margin-bottom: 16px; line-height: 1.75; }
.footer { margin-top: 28px; padding: 14px; border-top: 1px solid rgba(61,37,8,0.25); font-size: 10.5px; color: var(--text3); line-height: 1.85; text-align: center; }

/* ALT FINDER */
.alt-finder-wrap { padding: 0; }
.alt-search-hero {
  background: linear-gradient(160deg, var(--bg4) 0%, var(--bg3) 100%);
  border: 1.5px solid var(--gold2); border-radius: var(--radius);
  padding: 16px; margin-bottom: 14px; position: relative; overflow: hidden;
}
.alt-search-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% -10%, rgba(122,80,26,0.12) 0%, transparent 65%);
  pointer-events: none;
}
.alt-hero-label { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 9px; font-weight: 600; }

function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getBrand(n){ return BRANDS.find(b=>b.brand===n); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function vibrate(pattern) {
  if(navigator.vibrate) navigator.vibrate(pattern);
}

function addToRecent(brandName) {
  recentlyViewed = [brandName, ...recentlyViewed.filter(n=>n!==brandName)].slice(0,6);
}

function toggleFavorite(brandName) {
  if(favorites.includes(brandName)) {
    favorites = favorites.filter(n=>n!==brandName);
    showToast('Removed from favorites');
  } else {
    favorites.push(brandName);
    showToast('⭐ Added to favorites');
    vibrate([10, 50, 10]);
  }
  render();
}

function buildStatsRow() {
  const legit  = BRANDS.filter(b=>b.verdict==='legit').length;
  const sourced = BRANDS.filter(b=>b.verdict==='sourced').length;
  const mixed  = BRANDS.filter(b=>b.verdict==='mixed').length;
  return `<span class="stat-chip legit">✅ ${legit} Legit</span>
          <span class="stat-chip sourced">🚨 ${sourced} NDP</span>
          <span class="stat-chip mixed">⚠️ ${mixed} Mixed</span>`;
}

// AI LOOKUP
// ═══════════════════════════════════════════════════════════════════════════
function lookupBrandByName(name) {
  const b = getBrand(name);
  if(b) lookupBrand(b);
}

async function lookupBrand(brand) {
  brand = typeof brand === 'string' ? getBrand(brand) : brand;
  if(!brand) return;
  const key = brand.brand;
  const safeId = 'ai-' + key.replace(/\s+/g,'_').replace(/[^a-z0-9_]/gi,'');
  const el = document.getElementById(safeId);
  if(!el) return;
  el.innerHTML = '<div class="ai-result"><div class="ai-loading">Searching latest info on ' + e(key) + '…</div></div>';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `You are a bourbon industry expert. Search the web for the most current information about this bourbon brand: who actually distills it, current ownership, whether it's NDP/sourced, any recent news or acquisitions, and current pricing. Be concise (150 words max). Start directly with findings, no preamble. Use plain text, no markdown.`,
        messages: [{ role: 'user', content: `Search for current information about: ${key} bourbon whiskey. Who makes it, who owns it, is it sourced or distilled, any recent news?` }]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n').trim();
    aiResults[key] = text || 'No additional information found.';
    el.innerHTML = `<div class="ai-result" style="border-color:rgba(201,148,58,0.3)">
      <span class="ai-label">🔍 Live Web Search Results</span>
      ${e(aiResults[key]).replace(/\n/g,'<br>')}
    </div>`;
  } catch(err) {
    el.innerHTML = `<div class="ai-result" style="border-color:rgba(232,68,68,0.2);color:var(--sourced)">Unable to fetch live data. Check network connection.</div>`;
  }
}

function openCamera(context) {
  cameraContext = context || 'scanner';
  document.getElementById('cam-modal').classList.add('open');
  // Update instructions based on context
  const instr = document.getElementById('cam-instructions');
  if(instr) {
    if(cameraContext === 'buyInstead') instr.textContent = 'Scan a bottle to find what to buy instead';
    else if(cameraContext === 'altFinder') instr.textContent = 'Scan a bottle to find alternatives';
    else instr.textContent = 'Point at a bottle label — AI reads it automatically';
  }
  startCameraCapture();
}

function closeCamera() {
  document.getElementById('cam-modal').classList.remove('open');
  stopCamera();
}

function stopCamera() {
  if(cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  if(labelCaptureInterval) { clearInterval(labelCaptureInterval); labelCaptureInterval = null; }
  const video = document.getElementById('cam-video');
  if(video) { video.srcObject = null; }
}

async function startCameraCapture() {
  const video   = document.getElementById('cam-video');
  const status  = document.getElementById('cam-status');
  const container  = document.getElementById('cam-container');
  const fallback   = document.getElementById('cam-fallback');
  const fileInput  = document.getElementById('cam-file-input');

  status.textContent = 'Starting camera…';

  // Wire up the file input (works on every iOS version, no permissions needed)
  fileInput.onchange = async function() {
    const file = fileInput.files[0];
    if(!file) return;
    status.textContent = '🔍 Analyzing photo…';
    try {
      const base64 = await fileToBase64(file);
      await identifyLabelFromImage(base64, status);
    } catch(err) {
      status.textContent = '⚠️ Could not read photo. Try again.';
    }
  };

  // Try live getUserMedia first
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showFallback(container, fallback, status, 'Live camera not available.');
    return;
  }

  try {
    // iOS needs the simplest possible constraints
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    cameraStream = stream;
    video.muted = true;
    video.srcObject = stream;
    try { await video.play(); } catch(e) {}

    container.style.display = 'block';
    fallback.style.display  = 'none';
    status.textContent = '📸 Point at a bottle label';
    startLabelTextCapture(video, status);

  } catch(err) {
    // Any failure → show the file input fallback (always works on iOS)
    showFallback(container, fallback, status,
      err.name === 'NotAllowedError'
        ? '📷 Camera permission denied — use photo mode below'
        : '📷 Live camera unavailable — use photo mode below'
    );
  }
}

function showFallback(container, fallback, status, msg) {
  container.style.display = 'none';
  fallback.style.display  = 'block';
  status.textContent = msg;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function startLabelTextCapture(video, status) {
  if(labelCaptureInterval) clearInterval(labelCaptureInterval);
  let scanning = false;
  labelCaptureInterval = setInterval(async () => {
    if(!document.getElementById('cam-modal').classList.contains('open')) {
      clearInterval(labelCaptureInterval); labelCaptureInterval = null; return;
    }
    if(scanning || !video.videoWidth || !video.videoHeight) return;
    scanning = true;
    try {
      const canvas = document.getElementById('cam-canvas');
      canvas.width  = Math.min(video.videoWidth,  800);
      canvas.height = Math.min(video.videoHeight, 600);
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      if(base64) {
        status.textContent = '🔍 Analyzing…';
        await identifyLabelFromImage(base64, status);
      }
    } catch(e) {
      status.textContent = '📸 Point at a bottle label';
    } finally { scanning = false; }
  }, 3000);
}

async function identifyLabelFromImage(base64, status) {
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
          { type: 'text', text: 'If this image shows a bourbon or whiskey bottle label, reply with ONLY the brand name, nothing else. If no bottle label is visible, reply with only the word: none' }
        ]}]
      })
    });
    if(!resp.ok) { status.textContent = '📸 Point at a bottle label'; return; }
    const data = await resp.json();
    const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('').trim();
    if(!text || text.toLowerCase() === 'none' || text.length > 80) {
      status.textContent = '📸 Point at a bottle label';
      return;
    }
    const match = findBestMatch(text);
    if(match) {
      status.textContent = '✅ Found: ' + match.brand;
      if(navigator.vibrate) navigator.vibrate([30,60,30]);
      setTimeout(() => {
        closeCamera();
        addToRecent(match.brand);
        if(cameraContext === 'buyInstead') {
          currentTab = 4;
          render();
          // Scroll to and highlight the matching swap card
          setTimeout(() => {
            const el = document.getElementById('swap-' + match.brand.replace(/\s+/g,'_').replace(/[^a-z0-9_]/gi,''));
            if(el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.classList.add('cam-highlight'); }
          }, 200);
        } else if(cameraContext === 'altFinder') {
          currentTab = 5;
          altSelectBrand(match.brand);
          // Auto-run AI search
          setTimeout(() => runAltAi(), 300);
        } else {
          searchQuery = match.brand; filterMode = 'all'; openCard = match.brand; currentTab = 0;
          render();
        }
        showToast('✅ Found: ' + match.brand);
      }, 700);
    } else {
      status.textContent = '👀 Saw: "' + text + '" — searching…';
      setTimeout(() => {
        closeCamera();
        if(cameraContext === 'altFinder') {
          currentTab = 5; altQuery = text; altSelectedBrand = null; render();
        } else {
          searchQuery = text; filterMode = 'all'; currentTab = 0; render();
        }
      }, 700);
    }
  } catch(err) {
    status.textContent = '📸 Point at a bottle label';
  }
}

async function lookupBarcode(code) {
  showToast('Looking up barcode ' + code + '…');
  searchQuery = ''; currentTab = 0; render();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 300,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: `What bourbon or whiskey product has barcode/UPC ${code}? Search and tell me the brand name. Be very brief.` }]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('').trim();
    if(text) {
      const match = findBestMatch(text);
      if(match) { searchQuery = match.brand; openCard = match.brand; showToast('Found: ' + match.brand); }
    }
  } catch(e) {}
  render();
}

function findBestMatch(text) {
  const lower = text.toLowerCase();
  let best = null, bestScore = 0;
  for(const b of BRANDS) {
    const bname = b.brand.toLowerCase();
    if(lower.includes(bname) && bname.length > bestScore) { best = b; bestScore = bname.length; }
  }
  return best;
}

    <p class="section-desc">For every overpriced NDP there's a legitimately distilled bottle that delivers more.</p>
    ${cardsH}
    <div class="footer">Tap 🔍 on any card for live web pricing. Prices are approximate MSRP.</div>`;
}

async function buyWebSearch(brandName) {
  buyAiResults[brandName] = { loading: true, text: null };
  if(currentTab === 4) document.getElementById('main').innerHTML = renderBuyInstead();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 400,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: 'You are a bourbon expert. Search for current info on the requested bourbon: recent ownership changes, current street pricing, availability, and any recent controversy or news. Be concise, 120 words max, plain text only, no markdown.',
        messages: [{ role: 'user', content: `Search for current pricing, availability, and any recent news about: ${brandName} bourbon whiskey. Who actually makes it and what does it cost right now?` }]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n').trim();
    buyAiResults[brandName] = { loading: false, text: text || 'No results found.' };
  } catch(err) {
    buyAiResults[brandName] = { loading: false, text: 'Unable to connect. Check network.' };
  }
  if(currentTab === 4) document.getElementById('main').innerHTML = renderBuyInstead();
}

// ─── ALT FINDER ────────────────────────────────────────────────────────────
function renderAltFinder() {
  const matchingSugs = altQuery.length >= 2
    ? BRANDS.filter(b => b.brand.toLowerCase().includes(altQuery.toLowerCase())).slice(0, 8)
    : [];

  const sugH = matchingSugs.length && !altSelectedBrand ? `
    <div class="alt-suggestions">
      ${matchingSugs.map(b => `
        <div class="alt-sug-item" onclick="altSelectBrand('${e(b.brand)}')">
          <span class="alt-sug-name">${e(b.brand)}</span>
          <span class="alt-sug-badge ${b.verdict}">${b.verdict==='legit'?'✅ Legit':b.verdict==='sourced'?'🚨 NDP':'⚠️ Mixed'}</span>
        </div>`).join('')}
    </div>` : '';

  const filtersH = `
    <div class="alt-filters">
      <div class="alt-filter-group">
        <div class="alt-filter-label">💰 Budget</div>
        <select class="alt-filter-sel" onchange="altSetBudget(this.value)">
          <option value="any"${altBudget==='any'?' selected':''}>Any price</option>
          <option value="under30"${altBudget==='under30'?' selected':''}>Under $30</option>
          <option value="30to60"${altBudget==='30to60'?' selected':''}>$30–$60</option>
          <option value="60to100"${altBudget==='60to100'?' selected':''}>$60–$100</option>
          <option value="over100"${altBudget==='over100'?' selected':''}>$100+</option>
        </select>
      </div>
      <div class="alt-filter-group">
        <div class="alt-filter-label">🌶️ Flavor Profile</div>
        <select class="alt-filter-sel" onchange="altSetFlavor(this.value)">
          <option value="any"${altFlavor==='any'?' selected':''}>Any style</option>
          <option value="wheated"${altFlavor==='wheated'?' selected':''}>Wheated / Sweet</option>
          <option value="highRye"${altFlavor==='highRye'?' selected':''}>High Rye / Spicy</option>
          <option value="value"${altFlavor==='value'?' selected':''}>Best Value</option>
          <option value="caskStrength"${altFlavor==='caskStrength'?' selected':''}>Cask Strength</option>
          <option value="craft"${altFlavor==='craft'?' selected':''}>Independent Craft</option>
        </select>
      </div>
    </div>`;

  let selectedCardH='', curatedH='', aiSectionH='';

  if(altSelectedBrand) {
    const b = altSelectedBrand;
    const vc = b.verdict==='sourced'?'var(--sourced)':b.verdict==='mixed'?'var(--mixed)':'var(--legit)';
    const verdict = b.verdict==='legit'?'✅ Legitimate — actually distilled here':b.verdict==='sourced'?'🚨 NDP — sourced/factory bourbon':'⚠️ Mixed — sourced base, finished here';

    selectedCardH = `
      <div class="alt-selected-card ${b.verdict}">
        <div class="alt-sc-header">
          <div>
            <div class="alt-sc-name">${e(b.brand)}</div>
            <div style="font-size:11px;font-weight:700;margin-top:3px;color:${vc}">${verdict}</div>
          </div>
          <button class="alt-sc-clear" onclick="altClearBrand()">✕ Clear</button>
        </div>
        <div class="alt-sc-meta">🏭 ${e(b.maker)} · 📍 ${e(b.loc)} · ${e(b.price)}</div>
        <div class="alt-sc-note">${e(b.notes.split('.')[0])}.</div>
      </div>`;

    const swaps = (SWAPS[b.brand] || b.alts || []).map(n => getBrand(n)).filter(Boolean);
    const filteredSwaps = filterAltResults(swaps);

    if(filteredSwaps.length) {
      curatedH = `
        <div class="alt-curated-list">
          <div class="alt-section-lbl">✅ Curated Alternatives (${filteredSwaps.length})</div>
          ${filteredSwaps.map(r=>`
            <div class="alt-rec-card" onclick="altJumpTo('${e(r.brand)}')">
              <div class="alt-rec-left">
                <div class="alt-rec-name">${e(r.brand)}</div>
                <div class="alt-rec-maker">🏭 ${e(r.maker)}</div>
                <div class="alt-rec-note">${e(r.notes.split('.')[0])}.</div>
              </div>
              <div class="alt-rec-right">
                <div class="alt-rec-price">${e(r.price)}</div>
                ${r.pts?`<div class="alt-rec-pts">⭐ ${r.pts} pts</div>`:''}
              </div>
            </div>`).join('')}
        </div>`;
    } else if(b.verdict==='legit') {
      curatedH = `<div class="info-box" style="margin-bottom:14px">
        <div class="info-title" style="color:var(--legit)">✅ This is Legitimate Bourbon</div>
        <div class="info-text">${e(b.brand)} is actually distilled by ${e(b.maker)}. You don't need an alternative — this is the real deal. Use the AI finder below to discover similar styles.</div>
      </div>`;
    } else {
      curatedH = `<div class="info-box" style="margin-bottom:14px">
        <div class="info-title" style="color:var(--mixed)">No curated swaps yet</div>
        <div class="info-text">Use the AI Finder below — it will search current web data to recommend the best alternatives matching your budget and flavor preferences.</div>
      </div>`;
    }

    const aiLoadingH = `<div class="ai-result"><div class="ai-loading">Finding the best alternatives for ${e(b.brand)}…</div></div>`;
    aiSectionH = `
      <div class="alt-ai-section">
        <div class="alt-section-lbl">🤖 AI-Powered Finder</div>
        <div id="alt-ai-output">
          ${altAiLoading ? aiLoadingH : altAiResult
            ? `<div class="alt-ai-output"><h4>🔍 AI Recommendations</h4>${e(altAiResult).replace(/\n/g,'<br>')}</div>`
            : `<button class="alt-ai-btn" onclick="runAltAi()">
                🤖 Find More Alternatives with AI
                <span style="font-size:11px;color:var(--text3)">(live web search)</span>
              </button>`}
        </div>
      </div>`;
  } else {
    selectedCardH = `
      <div class="alt-no-brand">
        <div class="alt-no-icon">🔄</div>
        <div style="color:var(--text2);font-family:Playfair Display,serif;font-size:15px;margin-bottom:6px">Alternative Finder</div>
        Search for any bourbon above to find better, legitimately-distilled alternatives — filtered by your budget and flavor preference.
      </div>`;
  }

  return `
    <div class="alt-finder-wrap">
      <div class="alt-search-hero">
        <button class="tab-cam-btn" style="margin-bottom:12px" onclick="openCamera('altFinder')">
          <span class="tab-cam-btn-icon">📷</span>
          <div class="tab-cam-btn-text">
            <div class="tab-cam-btn-title">Scan a Bottle</div>
            <div class="tab-cam-btn-sub">AI identifies it &amp; searches web for alternatives</div>
          </div>
        </button>
        <div class="alt-hero-label">🔍 Or type to find alternatives for…</div>
        <div class="alt-search-row">
          <input class="alt-search-input" id="alt-si" type="search"
            placeholder="Search any bourbon brand…" value="${e(altQuery)}"
            autocomplete="off" autocorrect="off" spellcheck="false"
            oninput="altOnInput(this.value)">
          ${altQuery ? `<button class="alt-search-clear" onclick="altClearSearch()">✕</button>` : ''}
        </div>
        ${sugH}
      </div>
      ${filtersH}
      ${selectedCardH}
      ${curatedH}
      ${aiSectionH}
      <div class="footer">Alternatives are legitimately self-distilled unless otherwise noted.</div>
    </div>`;
}

function filterAltResults(brands) {
  return brands.filter(b => {
    if(altBudget !== 'any') {
      const nums = (b.price||'').match(/\d+/g);
      if(nums) {
        const mid = (parseInt(nums[0])+parseInt(nums[nums.length-1]))/2;
        if(altBudget==='under30' && mid>30) return false;
        if(altBudget==='30to60' && (mid<30||mid>60)) return false;
        if(altBudget==='60to100' && (mid<60||mid>100)) return false;
        if(altBudget==='over100' && mid<100) return false;
      }
    }
    if(altFlavor !== 'any') {
      const tags = (b.tags||[]).join(' ').toLowerCase();
      const notes = (b.notes||'').toLowerCase();
      if(altFlavor==='wheated' && !tags.includes('wheat') && !notes.includes('wheat')) return false;
      if(altFlavor==='highRye' && !tags.includes('rye') && !notes.includes('high-rye') && !notes.includes('high rye')) return false;
      if(altFlavor==='value' && !tags.includes('value') && !tags.includes('budget')) return false;
      if(altFlavor==='caskStrength' && !tags.includes('cask') && !notes.includes('cask') && !notes.includes('barrel proof') && !notes.includes('barrel-proof') && !notes.includes('uncut')) return false;
      if(altFlavor==='craft' && b.parent !== 'Independent / Family-Owned') return false;
    }
    return true;
  });
}

function altOnInput(v) { altQuery=v; if(!v) altSelectedBrand=null; altAiResult=null; altAiLoading=false; if(currentTab===5) renderAltTab(); }
function altClearSearch() { altQuery=''; altSelectedBrand=null; altAiResult=null; altAiLoading=false; if(currentTab===5) renderAltTab(); }
function altClearBrand() { altSelectedBrand=null; altAiResult=null; altAiLoading=false; altQuery=''; if(currentTab===5) renderAltTab(); }
function altSelectBrand(name) { const b=getBrand(name); if(!b) return; altSelectedBrand=b; altQuery=name; altAiResult=null; altAiLoading=false; renderAltTab(); }
function altSetBudget(v) { altBudget=v; renderAltTab(); }
function altSetFlavor(v) { altFlavor=v; renderAltTab(); }
function altJumpTo(name) { searchQuery=name; filterMode='all'; openCard=name; currentTab=0; render(); window.scrollTo(0,0); }
function renderAltTab() { if(currentTab!==5) return; document.getElementById('main').innerHTML=renderAltFinder(); }

async function runAltAi() {
  if(!altSelectedBrand) return;
  altAiLoading=true; altAiResult=null; renderAltTab();
  const b=altSelectedBrand;
  const budgetLabel={any:'any budget',under30:'under $30','30to60':'$30–$60','60to100':'$60–$100',over100:'over $100'}[altBudget]||'any budget';
  const flavorLabel={any:'any style',wheated:'wheated/sweet',highRye:'high-rye/spicy',value:'best value',caskStrength:'cask strength/barrel proof',craft:'independent craft'}[altFlavor]||'any style';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:`You are an expert bourbon sommelier and industry transparency advocate. Search the web for current information. Recommend 3–5 legitimately self-distilled alternatives to the requested brand. For each give: Name, Distillery, current street price (search for this), and one sentence why it's a better buy. Use plain text only, no markdown, no headers. Prioritize independent and family-owned distilleries. Note any recent ownership changes you find. Max 250 words.`,
        messages:[{role:'user',content:`The consumer wants alternatives to: ${b.brand} (${b.verdict==='sourced'?'NDP/sourced':b.verdict==='mixed'?'sourced base+finished':'self-distilled'}, ${b.price}, ${b.maker}). Budget preference: ${budgetLabel}. Flavor preference: ${flavorLabel}. Search for the best currently available alternatives that are actually distilled (not NDP).`}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n').trim();
    altAiResult = text || 'No results returned. Try adjusting filters.';
  } catch(err) {
    altAiResult = 'Unable to connect. Check network and try again.';
  }
  altAiLoading=false; renderAltTab();
}

// ─── EVENT HANDLERS ────────────────────────────────────────────────────────
function attachHandlers() {
  const si = document.getElementById('si');
  if(si) {
    si.addEventListener('input', evt => {
      searchQuery = evt.target.value;
      const sc = document.getElementById('sc');
      if(sc) sc.style.display = searchQuery ? 'block' : 'none';
      openCard = null;
      renderCards();
    });
  }
}

function renderCards() {
  if(currentTab!==0) return;
  document.getElementById('main').innerHTML = renderScanner();
  attachHandlers();
}

function switchTab(n) {
  currentTab = n;
  if(n !== 0) { openCard = null; }
  render();
  window.scrollTo(0, 0);
}

function setFilter(f) { filterMode=f; openCard=null; renderCards(); }
function setOwner(f) { ownerFilter=f; render(); }
function clearSearch() { searchQuery=''; openCard=null; renderCards(); }
function toggleCard(name) {
  openCard = openCard===name ? null : name;
  if(openCard) addToRecent(name);
  if(currentTab===0) renderCards();
}
function jumpTo(name) {
  searchQuery=name; filterMode='all'; openCard=name; currentTab=0;
  addToRecent(name); render(); window.scrollTo(0,0);
}
function jumpToSearch(v) {
  searchQuery=v; filterMode='all'; openCard=null; currentTab=0; render();
}

window.addEventListener('popstate', closeCamera);

// Init
document.getElementById('stats-row').innerHTML = buildStatsRow();
render();
</script>
